<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudeOS - Setup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1e1e1e;
      color: #cccccc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .logo .accent {
      color: #4a9eff;
    }

    .card {
      background-color: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 8px;
      padding: 32px;
    }

    .card h2 {
      font-size: 18px;
      font-weight: 500;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 14px;
      color: #999999;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #bbbbbb;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background-color: #1e1e1e;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      color: #ffffff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #4a9eff;
    }

    .form-group .error {
      border-color: #f44747;
    }

    .error-message {
      color: #f44747;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background-color: #4a9eff;
      border: none;
      border-radius: 4px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s;
    }

    .submit-btn:hover {
      background-color: #3d8ce4;
    }

    .submit-btn:disabled {
      background-color: #3c3c3c;
      color: #666666;
      cursor: not-allowed;
    }

    .status-panel {
      display: none;
      text-align: center;
      padding: 24px 0;
    }

    .status-panel .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #3c3c3c;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-panel .status-text {
      font-size: 14px;
      color: #cccccc;
    }

    .status-panel .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    .launch-btn {
      display: none;
      width: 100%;
      padding: 14px;
      background-color: #4a9eff;
      border: none;
      border-radius: 4px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: background-color 0.2s;
    }

    .launch-btn:hover {
      background-color: #3d8ce4;
    }

    .password-requirements {
      font-size: 12px;
      color: #666666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1><span class="accent">Claude</span>OS</h1>
    </div>

    <div class="card">
      <div id="setup-form">
        <h2>Welcome to ClaudeOS</h2>
        <p>Create your password to get started</p>

        <form id="passwordForm" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required>
            <div class="password-requirements">Minimum 8 characters</div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
            <div id="matchError" class="error-message">Passwords do not match</div>
          </div>

          <div id="serverError" class="error-message" style="margin-bottom: 12px;"></div>

          <button type="submit" class="submit-btn" id="submitBtn">Create Password</button>
        </form>
      </div>

      <div id="status-panel" class="status-panel">
        <div class="spinner"></div>
        <div class="status-text">Installing extensions<span class="dots"></span></div>
      </div>

      <button id="launchBtn" class="launch-btn" onclick="launchClaudeOS()">
        Launch ClaudeOS
      </button>
    </div>
  </div>

  <script>
    async function handleSubmit(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const matchError = document.getElementById('matchError');
      const serverError = document.getElementById('serverError');
      const submitBtn = document.getElementById('submitBtn');

      // Reset errors
      matchError.style.display = 'none';
      serverError.style.display = 'none';
      document.getElementById('confirmPassword').classList.remove('error');

      // Client-side validation
      if (password.length < 8) {
        serverError.textContent = 'Password must be at least 8 characters';
        serverError.style.display = 'block';
        return;
      }

      if (password !== confirmPassword) {
        matchError.style.display = 'block';
        document.getElementById('confirmPassword').classList.add('error');
        return;
      }

      // Disable submit
      submitBtn.disabled = true;
      submitBtn.textContent = 'Setting up...';

      try {
        const response = await fetch('/api/v1/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, confirmPassword }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Setup failed');
        }

        // Show installing status
        document.getElementById('setup-form').style.display = 'none';
        document.getElementById('status-panel').style.display = 'block';

        // Poll health endpoint for "ready" state
        pollForReady();
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Password';
        serverError.textContent = err.message;
        serverError.style.display = 'block';
      }
    }

    function pollForReady() {
      const interval = setInterval(async () => {
        try {
          const response = await fetch('/api/v1/health');
          const data = await response.json();

          if (data.status === 'ready' || data.status === 'ok') {
            clearInterval(interval);
            document.getElementById('status-panel').style.display = 'none';
            document.getElementById('launchBtn').style.display = 'block';
          }
        } catch {
          // Ignore errors during polling -- server may be restarting
        }
      }, 2000);
    }

    function launchClaudeOS() {
      window.location.reload();
    }
  </script>
</body>
</html>
