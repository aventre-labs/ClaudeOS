# ClaudeOS Railway Deployment Configuration
#
# Railway pulls the pre-built OCI image from GHCR (no build step on Railway).
#
# Push workflow:
#   1. nix build .#container                                      -- build OCI image
#   2. docker load < result                                        -- load into Docker
#   3. docker push ghcr.io/aventre-labs/claudeos:latest           -- push to GHCR
#
# Railway environment variables to set in dashboard:
#   - PORT=8080 (Railway routes public traffic to this port for code-server)
#   - CLAUDEOS_DATA_DIR=/data

[build]
# No build step -- Railway pulls pre-built image from GHCR
dockerImage = "ghcr.io/aventre-labs/claudeos:latest"

[deploy]
# Health check uses the supervisor API (port 3100 internally)
# Railway routes the healthcheck to the container's internal port
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120       # 120s to allow first-boot setup (Claude Code install, extensions)
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistent volume for sessions, secrets, extensions, and config
[[deploy.volumes]]
mount = "/data"
